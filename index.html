<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Kalkulator</title>
        <link rel="stylesheet" href="kalkulator.css">
    </head>

    <body>
        <div class="badan">
            <div class="display"></div>
            <div class="tombol">
                <button class="1" value="1">1</button>
                <button class="2" value="2">2</button>
                <button class="3" value="3">3</button>
                <button class="tambah operator" value="+">+</button>
                <button class="4" value="4">4</button>
                <button class="5" value="5">5</button>
                <button class="6" value="6">6</button>
                <button class="kurang operator" value="-">-</button>
                <button class="7" value="7">7</button>
                <button class="8" value="8">8</button>
                <button class="9" value="9">9</button>
                <button class="kali operator" value="*">x</button>
                <button class="hapus" value="">C</button>
                <button class="0" value="0">0</button>
                <button class="equal" value="=">=</button>
                <button class="bagi operator" value="/">/</button>
            </div>    
        </div>

        <script src="kalkulator.js"></script>
    </body>
</html>
